apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tricore-agent.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tricore-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ═══════════════════════════════════════
  # 生产环境必须修改以下值！
  # ═══════════════════════════════════════

  # ── 主 LLM API Key（必需） ──
  llm-api-key: ""

  # ── JWT 签名密钥（至少 32 字符随机字符串） ──
  # 生产环境必须设置为唯一的随机字符串
  jwt-secret: ""

  # ── 管理员密码 ──
  admin-password: ""

  # ── API Token（用于外部调用认证） ──
  api-token: ""

  # ── 多Provider API Keys（可选） ──
  # ═══ 国内 Provider ═══
  deepseek-api-key: ""
  qwen-api-key: ""
  zhipu-api-key: ""
  moonshot-api-key: ""
  minimax-api-key: ""

  # ═══ 国际 Provider ═══
  openai-api-key: ""
  anthropic-api-key: ""
  google-api-key: ""
  mistral-api-key: ""
  cohere-api-key: ""

  # ═══ 聚合 Provider ═══
  openrouter-api-key: ""
  together-api-key: ""
