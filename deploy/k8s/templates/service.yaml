apiVersion: v1
kind: Service
metadata:
  name: {{ include "tricore-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tricore-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "tricore-agent.selectorLabels" . | nindent 4 }}
  ports:
    - name: {{ .Values.service.ports.http.name }}
      port: {{ .Values.service.ports.http.port }}
      targetPort: {{ .Values.service.ports.http.targetPort }}
      protocol: {{ .Values.service.ports.http.protocol }}
    - name: {{ .Values.service.ports.health.name }}
      port: {{ .Values.service.ports.health.port }}
      targetPort: {{ .Values.service.ports.health.targetPort }}
      protocol: {{ .Values.service.ports.health.protocol }}
    - name: {{ .Values.service.ports.websocket.name }}
      port: {{ .Values.service.ports.websocket.port }}
      targetPort: {{ .Values.service.ports.websocket.targetPort }}
      protocol: {{ .Values.service.ports.websocket.protocol }}
    - name: {{ .Values.service.ports.dashboard.name }}
      port: {{ .Values.service.ports.dashboard.port }}
      targetPort: {{ .Values.service.ports.dashboard.targetPort }}
      protocol: {{ .Values.service.ports.dashboard.protocol }}
