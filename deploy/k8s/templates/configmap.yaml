apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tricore-agent.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tricore-agent.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.configMap }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  # ── 启动脚本辅助配置 ──
  TRICORE_CONFIG_VERSION: "1.0.0"
  TRICORE_CONFIG_SOURCE: "kubernetes-configmap"
