# ──────────────────────────────────────────────────────────
# TriCore Agent v1.0 — Helm Chart Values
# 蜜糖 TriCore Agent 三核融合自主智能体
# ──────────────────────────────────────────────────────────

# ── 副本数 ──
replicaCount: 1

# ── 镜像配置 ──
image:
  repository: mitang-tricore-agent
  tag: "1.0.0"
  pullPolicy: IfNotPresent
  # imagePullSecrets:
  #   - name: docker-registry-secret

# ── 部署策略 ──
strategy:
  type: Recreate  # SQLite 需要单实例写入，不可并行

# ── 名称覆盖（可选） ──
nameOverride: ""
fullnameOverride: ""

# ── 服务账户 ──
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ── Pod 注解 ──
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3722"
  prometheus.io/path: "/metrics"

# ── Pod 安全上下文 ──
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

# ── 容器安全上下文 ──
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false  # SQLite 需要写 /app/data
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000

# ── Service 配置 ──
service:
  type: ClusterIP
  ports:
    http:
      port: 3721
      targetPort: 3721
      protocol: TCP
      name: http-api
    health:
      port: 3722
      targetPort: 3722
      protocol: TCP
      name: http-health
    websocket:
      port: 3723
      targetPort: 3723
      protocol: TCP
      name: ws
    dashboard:
      port: 3724
      targetPort: 3724
      protocol: TCP
      name: http-dashboard

# ── Ingress 配置（可选） ──
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: tricore-agent.local
      paths:
        - path: /
          pathType: Prefix
          port: 3721
  tls: []
  #  - secretName: tricore-agent-tls
  #    hosts:
  #      - tricore-agent.local

# ── 资源限制 ──
resources:
  requests:
    memory: "256Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "2000m"

# ── 持久化存储（SQLite 数据） ──
persistence:
  enabled: true
  # 如果使用 storageClass，设置为合适的类名；否则留空使用默认
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  # 保留已存在的 PVC（升级时数据不丢失）
  existingClaim: ""
  # 数据挂载路径
  mountPath: /app/data

# ── 临时存储（/tmp 用于 Playwright 等） ──
tmpfsSize: "128Mi"

# ── 环境变量 ──
env:
  # ── Node.js 运行时 ──
  NODE_ENV: production
  NODE_OPTIONS: "--max-old-space-size=512"

  # ── TriCore 核心配置 ──
  TRICORE_DATA_DIR: /app/data
  TRICORE_LOG_DIR: /app/data/logs
  TRICORE_ALLOW_LAN: "0"
  TRICORE_PERSIST_ENABLED: "true"

  # ── 调度器配置 ──
  TRICORE_TICK_CONCURRENCY: "2"
  TRICORE_HOURLY_BUDGET: "50000"

  # ── WebSocket 配置 ──
  TRICORE_WS_ENABLED: "true"
  TRICORE_WS_PORT: "3723"
  TRICORE_WS_HEARTBEAT: "30000"

  # ── Dashboard ──
  TRICORE_DASHBOARD_ENABLED: "true"
  TRICORE_DASHBOARD_PORT: "3724"

  # ── 启动自检 ──
  TRICORE_SELFCHECK_ENABLED: "true"
  TRICORE_SELFCHECK_TIMEOUT: "180000"

  # ── 国际化 ──
  TRICORE_LOCALE: "zh-CN"

  # ── 内容安全过滤 ──
  TRICORE_CONTENT_FILTER_ENABLED: "true"
  TRICORE_CONTENT_FILTER_MODE: "standard"

  # ── LLM Provider 配置（从 Secret 注入，此处仅设非敏感默认值） ──
  LLM_PROVIDER: deepseek
  LLM_MODEL: ""

  # ── OpenTelemetry ──
  OTEL_SERVICE_NAME: mitang-tricore-agent
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_TRACES_EXPORTER: otlp
  OTEL_METRICS_EXPORTER: prometheus
  OTEL_LOG_LEVEL: info

# ── 敏感环境变量（引用 Secret 中的 key） ──
envSecrets:
  - name: LLM_API_KEY
    secretKeyRef:
      name: tricore-agent-secrets
      key: llm-api-key
  - name: TRICORE_JWT_SECRET
    secretKeyRef:
      name: tricore-agent-secrets
      key: jwt-secret
  - name: TRICORE_ADMIN_PASSWORD
    secretKeyRef:
      name: tricore-agent-secrets
      key: admin-password
  - name: TRICORE_API_TOKEN
    secretKeyRef:
      name: tricore-agent-secrets
      key: api-token
  # ── 多Provider API Keys ──
  - name: OPENAI_API_KEY
    secretKeyRef:
      name: tricore-agent-secrets
      key: openai-api-key
      optional: true
  - name: ANTHROPIC_API_KEY
    secretKeyRef:
      name: tricore-agent-secrets
      key: anthropic-api-key
      optional: true
  - name: DEEPSEEK_API_KEY
    secretKeyRef:
      name: tricore-agent-secrets
      key: deepseek-api-key
      optional: true
  - name: QWEN_API_KEY
    secretKeyRef:
      name: tricore-agent-secrets
      key: qwen-api-key
      optional: true
  - name: ZHIPU_API_KEY
    secretKeyRef:
      name: tricore-agent-secrets
      key: zhipu-api-key
      optional: true
  - name: MOONSHOT_API_KEY
    secretKeyRef:
      name: tricore-agent-secrets
      key: moonshot-api-key
      optional: true
  - name: MINIMAX_API_KEY
    secretKeyRef:
      name: tricore-agent-secrets
      key: minimax-api-key
      optional: true

# ── ConfigMap 数据 ──
configMap:
  # 日志配置
  LOG_MAX_SIZE: "20m"
  LOG_MAX_FILES: "5"
  # 调度器高级配置
  TRICORE_SCHEDULER_AWAKENING_TICKS: "10"
  TRICORE_SCHEDULER_MAX_TICKS_PER_HOUR: "12"
  TRICORE_SCHEDULER_TICK_INTERVAL_IDLE_MS: "300000"
  TRICORE_SCHEDULER_TICK_INTERVAL_ACTIVE_MS: "30000"
  # 性能调优
  TRICORE_MQ_MAX_SIZE: "10000"
  TRICORE_MQ_OVERFLOW_STRATEGY: "reject_new"
  TRICORE_MQ_MAX_RETRIES: "3"
  TRICORE_PERF_SLOW_THRESHOLD_MS: "1000"
  TRICORE_PERF_CRITICAL_THRESHOLD_MS: "5000"
  # 速率限制
  TRICORE_RATE_LIMIT_CAPACITY: "100"
  TRICORE_RATE_LIMIT_REFILL_RATE: "10"
  # 分布式锁
  TRICORE_LOCK_TTL_MS: "30000"

# ── 健康检查 ──
healthChecks:
  liveness:
    enabled: true
    path: /health
    port: 3722
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  readiness:
    enabled: true
    path: /ready
    port: 3722
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
    successThreshold: 1
  startup:
    enabled: true
    path: /health
    port: 3722
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30  # 最多等 5 + 30*10 = 305 秒

# ── 自动扩缩容（默认禁用，SQLite 单实例） ──
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# ── 节点选择 ──
nodeSelector: {}

# ── 容忍度 ──
tolerations: []

# ── 亲和性 ──
affinity: {}

# ── Pod 中断预算 ──
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# ── 额外的环境变量 ──
extraEnv: []
#  - name: CUSTOM_VAR
#    value: custom-value

# ── 额外的卷挂载 ──
extraVolumes: []
#  - name: extra-storage
#    persistentVolumeClaim:
#      claimName: extra-pvc

extraVolumeMounts: []
#  - name: extra-storage
#    mountPath: /app/extra

# ── OpenTelemetry Sidecar（可选） ──
otelSidecar:
  enabled: false
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.102.0"
    pullPolicy: IfNotPresent
  configMountPath: /etc/otel-collector
