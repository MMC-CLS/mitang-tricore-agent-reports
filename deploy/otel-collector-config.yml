# ═══════════════════════════════════════════════════════════
# OpenTelemetry Collector 配置 — TriCore Agent v1.0
# ═══════════════════════════════════════════════════════════
#
# 使用方式:
#   docker run -v $(pwd)/deploy/otel-collector-config.yml:/etc/otel/config.yml \
#     otel/opentelemetry-collector-contrib:0.102.0
#
#   Kubernetes:
#     kubectl create configmap tricore-otel-config \
#       --from-file=config.yml=deploy/otel-collector-config.yml
# ═══════════════════════════════════════════════════════════

receivers:
  # ── OTLP 接收器 (gRPC + HTTP) ──
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        # TLS 配置（生产环境启用）
        # tls:
        #   cert_file: /etc/otel/certs/server.crt
        #   key_file: /etc/otel/certs/server.key
      http:
        endpoint: 0.0.0.0:4318
        # CORS 配置
        cors:
          allowed_origins:
            - "http://localhost:*"
            - "http://127.0.0.1:*"
          allowed_headers:
            - "*"

  # ── Prometheus Receiver (抓取自身指标) ──
  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector-self'
          scrape_interval: 15s
          static_configs:
            - targets: ['0.0.0.0:8888']

processors:
  # ── 批处理 — 减少网络往返 ──
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024

  # ── 内存限制 — 防止 OOM ──
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  # ── 属性处理 — 添加/过滤/重命名 ──
  attributes:
    actions:
      - key: deployment.environment
        action: insert
        value: production
      - key: service.namespace
        action: insert
        value: mitang-tricore

  # ── 资源检测 — 自动检测主机信息 ──
  resourcedetection:
    detectors: [env, system]
    override: false
    timeout: 5s

  # ── 尾部采样（可选，生产环境建议启用以控制成本） ──
  # tail_sampling:
  #   policies:
  #     - name: error-policy
  #       type: status_code
  #       status_code: { status_codes: [ERROR] }
  #     - name: slow-policy
  #       type: latency
  #       latency: { threshold_ms: 5000 }
  #     - name: probabilistic-policy
  #       type: probabilistic
  #       probabilistic: { sampling_percentage: 10 }

exporters:
  # ── Prometheus 指标导出 ──
  prometheus:
    endpoint: "0.0.0.0:9464"
    namespace: tricore
    # 启用累积时间序列
    enable_open_metrics: true
    resource_to_telemetry_conversion:
      enabled: true

  # ── Jaeger 追踪导出（可选） ──
  jaeger:
    endpoint: "jaeger-collector:14250"
    tls:
      insecure: true

  # ── OTLP 导出（到 Grafana Tempo / Honeycomb / 等） ──
  # otlp:
  #   endpoint: "tempo.example.com:4317"
  #   tls:
  #     insecure: false
  #   headers:
  #     authorization: "Bearer ${TEMPO_API_TOKEN}"

  # ── 日志调试导出（开发环境） ──
  debug:
    verbosity: basic
    sampling_initial: 2
    sampling_thereafter: 500

  # ── 标准输出（结构化日志） ──
  logging:
    loglevel: info
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  # ── 健康检查端点 ──
  health_check:
    endpoint: 0.0.0.0:13133
    path: /health/status

  # ── Collector 自身指标 ──
  pprof:
    endpoint: 0.0.0.0:1777

  # ── zPages 调试页面 ──
  zpages:
    endpoint: 0.0.0.0:55679

service:
  # ── 启用的扩展 ──
  extensions: [health_check, pprof, zpages]

  # ── 管道配置 ──
  pipelines:
    # 追踪管道
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes, resourcedetection]
      exporters: [debug, logging]
      # 生产环境使用 Jaeger 或 OTLP:
      # exporters: [jaeger, debug]
      # 或:
      # exporters: [otlp, debug]

    # 指标管道
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch, attributes, resourcedetection]
      exporters: [prometheus, debug, logging]

    # 日志管道（预留）
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes, resourcedetection]
      exporters: [debug, logging]
