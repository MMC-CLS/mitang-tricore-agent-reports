<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消息管道 — 蜜糖 TriCore Agent</title>
  <style>
    :root {
      --bg: #0a0a1a; --panel: #111128; --card: #16163a; --text: #e0e0ff;
      --text2: #8888bb; --text3: #555580; --accent: #4488ff;
      --border: #2a2a5a; --radius: 8px;
      --green: #44dd88; --yellow: #ffcc44; --red: #ff4466; --purple: #aa66ff; --cyan: #44ddff;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ═══ 顶部栏 ═══ */
    .top-bar {
      height: 48px; background: linear-gradient(180deg, var(--panel) 0%, #0e0e2a 100%);
      border-bottom: 1px solid var(--border); display: flex; align-items: center;
      padding: 0 16px; justify-content: space-between; box-shadow: 0 1px 8px rgba(0,0,0,0.3);
    }
    .top-bar .logo { display:flex; align-items:center; gap:8px; font-size:15px; font-weight:600; }
    .top-bar .logo .icon { font-size:18px; }
    .top-bar nav { display:flex; gap:4px; }
    .top-bar nav a { color: var(--text2); text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; transition: all .2s; }
    .top-bar nav a:hover { color: var(--text); background: var(--card); }
    .top-bar nav a.active { color: var(--purple); background: rgba(170,102,255,0.1); font-weight:600; }
    .top-bar .controls { display:flex; gap:8px; align-items:center; }

    /* ═══ 主布局 ═══ */
    .main { display:flex; height: calc(100vh - 48px); }

    /* ═══ 左侧面板 ═══ */
    .sidebar {
      width: 320px; min-width: 320px; background: var(--panel);
      border-right: 1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto;
    }
    .sidebar-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .sidebar-section h4 { font-size: 11px; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; letter-spacing: 1px; display:flex; align-items:center; gap:6px; }

    /* 统计卡片网格 */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .stat-card {
      background: var(--card); border-radius: 6px; padding: 8px; text-align: center;
      border: 1px solid transparent; transition: all .2s; cursor: default;
    }
    .stat-card:hover { border-color: var(--border); }
    .stat-card .value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-card .label { font-size: 9px; color: var(--text3); text-transform: uppercase; margin-top: 2px; }
    .stat-card.cyan .value { color: var(--cyan); }
    .stat-card.green .value { color: var(--green); }
    .stat-card.yellow .value { color: var(--yellow); }
    .stat-card.red .value { color: var(--red); }
    .stat-card.purple .value { color: var(--purple); }
    .stat-card.blue .value { color: var(--accent); }

    /* 搜索/过滤 */
    .filter-bar { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
    .filter-tag {
      padding:3px 10px; border-radius:10px; font-size:10px; cursor:pointer;
      border:1px solid var(--border); background:transparent; color:var(--text3); transition:all .2s;
    }
    .filter-tag:hover { border-color:var(--accent); color:var(--text); }
    .filter-tag.active { background:rgba(68,136,255,0.15); border-color:var(--accent); color:var(--accent); }
    .search-input {
      width:100%; padding:7px 12px; background:var(--card); border:1px solid var(--border);
      border-radius:6px; color:var(--text); font-size:12px; outline:none; margin-bottom:8px;
      transition:border-color .2s;
    }
    .search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(68,136,255,0.08); }

    /* 管道列表 */
    .pipeline-list { flex:1; overflow-y:auto; padding:0 14px 12px; }
    .pipeline-item {
      background: var(--card); border-radius: 7px; padding: 10px 12px; margin-bottom: 6px;
      border-left: 3px solid var(--border); cursor: pointer; transition: all .2s; font-size: 12px;
    }
    .pipeline-item:hover { background: #1e1e4a; transform: translateX(2px); }
    .pipeline-item.selected { border-left-color: var(--accent); box-shadow: 0 0 8px rgba(68,136,255,0.1); }
    .pipeline-item .pi-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .pipeline-item .pi-content { color: var(--text2); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
    .pipeline-item .pi-footer { display:flex; justify-content:space-between; font-size:9px; color:var(--text3); }
    .pipeline-item .pi-id { font-family:'Cascadia Code',monospace; font-size:10px; color:var(--text3); }

    /* 徽章系统 */
    .badge {
      display:inline-block; padding:2px 7px; border-radius:4px; font-size:9px; font-weight:600;
      letter-spacing:0.3px;
    }
    .badge-superposed { background:rgba(68,136,255,0.15); color:var(--accent); }
    .badge-entangled { background:rgba(170,102,255,0.15); color:var(--purple); animation:badgeGlow 2s ease-in-out infinite; }
    .badge-collapsed { background:rgba(68,221,136,0.15); color:var(--green); }
    .badge-determined { background:rgba(68,221,255,0.15); color:var(--cyan); }
    @keyframes badgeGlow { 0%,100% { box-shadow:0 0 0 rgba(170,102,255,0); } 50% { box-shadow:0 0 8px rgba(170,102,255,0.4); } }

    .state-badge {
      display:inline-block; padding:2px 8px; border-radius:4px; font-size:9px; font-weight:600;
    }
    .state-complete { background:rgba(68,221,136,0.12); color:var(--green); }
    .state-processing { background:rgba(255,204,68,0.12); color:var(--yellow); }
    .state-receiving { background:rgba(68,221,255,0.12); color:var(--cyan); }
    .state-analyzing { background:rgba(68,136,255,0.12); color:var(--accent); }
    .state-routing { background:rgba(170,102,255,0.12); color:var(--purple); }
    .state-responding { background:rgba(68,221,136,0.12); color:var(--green); }
    .state-interrupted { background:rgba(255,68,102,0.12); color:var(--red); }

    /* 意图徽章 */
    .intent-badge {
      display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:500;
    }
    .intent-question { background:rgba(68,221,255,0.12); color:var(--cyan); }
    .intent-command { background:rgba(255,204,68,0.12); color:var(--yellow); }
    .intent-analysis { background:rgba(170,102,255,0.12); color:var(--purple); }
    .intent-search { background:rgba(68,136,255,0.12); color:var(--accent); }
    .intent-coding { background:rgba(68,221,136,0.12); color:var(--green); }
    .intent-conversation { background:rgba(255,160,40,0.12); color:#ffa028; }

    /* ═══ 右侧详情 ═══ */
    .detail-panel {
      flex:1; padding:20px; overflow-y:auto; background:linear-gradient(180deg, rgba(10,10,26,0.5) 0%, var(--bg) 100%);
    }
    .detail-panel h3 { font-size:16px; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
    .detail-section {
      background: var(--card); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px;
      border:1px solid var(--border); transition:border-color .2s;
    }
    .detail-section:hover { border-color:rgba(68,136,255,0.2); }
    .detail-section h4 { font-size:11px; color: var(--text2); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; display:flex; align-items:center; gap:6px; }
    .detail-row { display:flex; justify-content:space-between; padding:5px 0; font-size:12px; border-bottom:1px solid rgba(255,255,255,0.02); }
    .detail-row:last-child { border-bottom:none; }
    .detail-row .key { color: var(--text3); }
    .detail-row .val { color: var(--text); font-weight:500; }

    /* 情感向量 */
    .affect-bar { display:flex; align-items:center; gap:8px; margin:5px 0; }
    .affect-bar .a-label { width:55px; font-size:10px; color:var(--text3); text-align:right; }
    .affect-bar .a-bar { flex:1; height:12px; background:var(--panel); border-radius:6px; overflow:hidden; }
    .affect-bar .a-fill { height:100%; border-radius:6px; transition:width .4s ease; }
    .affect-bar .a-val { width:30px; font-size:10px; text-align:right; color:var(--text2); font-family:'Cascadia Code',monospace; }

    /* 管道时间线 */
    .timeline { position:relative; padding-left:20px; }
    .timeline::before { content:''; position:absolute; left:7px; top:0; bottom:0; width:2px; background:var(--border); }
    .timeline-step { position:relative; padding:6px 0 6px 20px; font-size:11px; }
    .timeline-step::before { content:''; position:absolute; left:-16px; top:10px; width:8px; height:8px; border-radius:50%; background:var(--border); }
    .timeline-step.active::before { background:var(--accent); box-shadow:0 0 6px var(--accent); }
    .timeline-step.completed::before { background:var(--green); box-shadow:0 0 6px var(--green); }
    .timeline-step .ts-label { color:var(--text3); font-size:10px; }
    .timeline-step .ts-value { color:var(--text); }

    /* 操作按钮 */
    .detail-actions { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .action-btn {
      padding:6px 14px; border-radius:6px; font-size:11px; cursor:pointer; border:1px solid var(--border);
      background:transparent; color:var(--text2); transition:all .2s;
    }
    .action-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(68,136,255,0.08); }
    .action-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .action-btn.primary:hover { background:#5599ff; }
    .action-btn.danger:hover { border-color:var(--red); color:var(--red); background:rgba(255,68,102,0.08); }

    /* DAG 视图 */
    .dag-view { position:relative; height:400px; background:radial-gradient(ellipse at center, #0d0d2a 0%, #050515 100%); border-radius:8px; border:1px solid var(--border); overflow:hidden; margin-top:12px; }
    .dag-view canvas { position:absolute; top:0;left:0; width:100%;height:100%; }
    .dag-legend { position:absolute; bottom:8px; right:8px; font-size:9px; color:var(--text3); display:flex; gap:10px; background:rgba(10,10,26,0.8); padding:4px 10px; border-radius:5px; }

    /* 空状态 */
    .empty-state { text-align:center; color:var(--text3); padding:48px 20px; font-size:13px; }
    .empty-state .empty-icon { font-size:40px; margin-bottom:12px; opacity:0.5; }

    /* 实时指示器 */
    .live-indicator { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--green); }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:livePulse 1.5s infinite; }
    @keyframes livePulse { 0%,100% { opacity:1; box-shadow:0 0 4px var(--green); } 50% { opacity:0.4; box-shadow:0 0 8px var(--green); } }

    /* 批量操作栏 */
    .batch-bar {
      display:flex; gap:8px; align-items:center; padding:8px 14px; background:var(--card);
      border-bottom:1px solid var(--border); font-size:11px; color:var(--text2);
    }
    .batch-bar .batch-count { color:var(--accent); font-weight:600; }
  </style>
</head>
<body>
  <header class="top-bar">
    <div class="logo">
      <span class="icon">⚛️</span>
      <span>蜜糖 TriCore Agent — 消息管道</span>
    </div>
    <nav>
      <a href="index.html">📊 总览</a>
      <a href="chat.html">💬 对话</a>
      <a href="memory-graph.html">🕸 记忆图谱</a>
      <a href="pipeline.html" class="active">⚛ 消息管道</a>
      <a href="subagents.html">🤖 子智能体</a>
    </nav>
    <div class="controls">
      <span class="live-indicator"><span class="live-dot"></span>实时</span>
      <button class="btn-settings" id="btn-settings" title="系统设置 (Ctrl+,)" style="background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:15px;transition:all .2s;">⚙️</button>
    </div>
  </header>

  <div class="main">
    <!-- ═══ 左侧面板 ═══ -->
    <aside class="sidebar">
      <!-- 统计 -->
      <div class="sidebar-section">
        <h4>📊 管道统计</h4>
        <div class="stats-grid">
          <div class="stat-card cyan"><div class="value" id="stat-total">0</div><div class="label">总消息</div></div>
          <div class="stat-card blue"><div class="value" id="stat-active">0</div><div class="label">活跃管道</div></div>
          <div class="stat-card green"><div class="value" id="stat-completed">0</div><div class="label">已完成</div></div>
          <div class="stat-card red"><div class="value" id="stat-interrupted">0</div><div class="label">已中断</div></div>
          <div class="stat-card purple"><div class="value" id="stat-entangled">0</div><div class="label">纠缠态</div></div>
          <div class="stat-card yellow"><div class="value" id="stat-avg-time">0ms</div><div class="label">平均处理</div></div>
        </div>
      </div>

      <!-- 过滤器 -->
      <div class="sidebar-section">
        <h4>🔍 过滤</h4>
        <input class="search-input" id="search-input" placeholder="搜索消息内容..." oninput="applyFilters()">
        <div class="filter-bar" id="filter-bar">
          <span class="filter-tag active" data-filter="all" onclick="setFilter('all',this)">全部</span>
          <span class="filter-tag" data-filter="processing" onclick="setFilter('processing',this)">处理中</span>
          <span class="filter-tag" data-filter="complete" onclick="setFilter('complete',this)">已完成</span>
          <span class="filter-tag" data-filter="interrupted" onclick="setFilter('interrupted',this)">已中断</span>
          <span class="filter-tag" data-filter="entangled" onclick="setFilter('entangled',this)">纠缠态</span>
          <span class="filter-tag" data-filter="superposed" onclick="setFilter('superposed',this)">叠加态</span>
        </div>
        <div class="filter-bar">
          <span class="filter-tag active" data-intent="all" onclick="setIntentFilter('all',this)">所有意图</span>
          <span class="filter-tag" data-intent="question" onclick="setIntentFilter('question',this)">问答</span>
          <span class="filter-tag" data-intent="command" onclick="setIntentFilter('command',this)">命令</span>
          <span class="filter-tag" data-intent="analysis" onclick="setIntentFilter('analysis',this)">分析</span>
          <span class="filter-tag" data-intent="coding" onclick="setIntentFilter('coding',this)">编码</span>
          <span class="filter-tag" data-intent="search" onclick="setIntentFilter('search',this)">搜索</span>
        </div>
      </div>

      <!-- 管道列表标题 -->
      <div class="batch-bar" id="batch-bar" style="display:none;">
        <span>已选 <span class="batch-count" id="batch-count">0</span> 条</span>
        <button class="action-btn" onclick="batchRetry()">🔄 重试</button>
        <button class="action-btn danger" onclick="batchCancel()">✕ 取消</button>
        <button class="action-btn" onclick="clearSelection()">清除选择</button>
      </div>

      <!-- 管道列表 -->
      <div class="pipeline-list" id="pipeline-list">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          暂无活跃管道
        </div>
      </div>
    </aside>

    <!-- ═══ 右侧详情 ═══ -->
    <div class="detail-panel" id="detail-panel">
      <div class="empty-state">
        <div class="empty-icon">⚛️</div>
        <div>选择左侧管道查看消息处理详情</div>
        <div style="font-size:11px;margin-top:8px;">包含量子态分析、情感向量、路由决策等</div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════
    // 消息管道 — 增强面板 v4.0
    // ═══════════════════════════════════════

    const pipelines = [];
    let selectedId = null;
    let currentFilter = 'all';
    let currentIntentFilter = 'all';
    let selectedIds = new Set();
    let searchQuery = '';

    // ── 数据生成 ──
    function generateDemoData() {
      pipelines.length = 0;
      const intents = ['question','command','analysis','search','conversation','coding'];
      const users = ['user_alice','user_bob','system','agent_1','api_gateway'];
      const states = ['complete','processing','interrupted','receiving','analyzing','routing','responding'];
      const quantumStates = ['superposed','entangled','collapsed','determined'];
      const contents = [
        '你好，帮我分析一下销售数据并生成报告',
        '为什么天空是蓝色的？请从物理学角度解释',
        '创建一个数据分析报告模板',
        '搜索最新的AI研究论文并总结',
        '运行sales_report.py脚本并输出结果',
        '这段代码有什么问题？帮我修复bug',
        '对比Q1和Q2的业绩数据，找出增长点',
        '请解释机器学习的基本概念和算法分类',
        '帮我设计一个数据库表结构',
        '优化这段SQL查询的性能',
        '分析用户反馈中的情感倾向',
        '生成一个数据可视化图表',
        '请将这段Python代码翻译成Go',
        '检查系统安全漏洞并给出修复建议',
        '帮我写一篇技术博客的提纲',
      ];

      for (let i=0;i<30;i++) {
        const state=states[Math.floor(Math.random()*states.length)];
        const created=Date.now()-Math.random()*7200000;
        const completed=state==='complete'?created+Math.random()*45000:null;
        const intent=intents[Math.floor(Math.random()*intents.length)];
        const content=contents[Math.floor(Math.random()*contents.length)];
        const qs=state==='complete'?'collapsed':quantumStates[Math.floor(Math.random()*quantumStates.length)];

        pipelines.push({
          msgId:`msg_${Date.now()}_${Math.random().toString(36).substr(2,8)}`,
          from:users[Math.floor(Math.random()*users.length)],
          content,
          channel:['direct','api','system','agent','webhook'][Math.floor(Math.random()*5)],
          priority:[200,150,100,80,50,30][Math.floor(Math.random()*6)],
          state,
          quantumState:qs,
          timestamp:created,
          completedAt:completed,
          processingDuration:completed?completed-created:null,
          analysis:{
            intent,
            complexity:{level:['low','medium','high','extreme'][Math.floor(Math.random()*4)],score:Math.random()},
            language:Math.random()>0.4?'zh':'en',
            affect:[Math.random(),Math.random(),Math.random(),Math.random(),Math.random(),Math.random()],
            entities:Math.random()>0.4?['https://example.com/data.csv','sales_report.py']:[],
            keywords:content.split(' ').slice(0,3),
            confidence:0.7+Math.random()*0.3,
          },
          route:{
            target:intent==='command'||intent==='search'||intent==='coding'?'execution':'consciousness',
            cores:['consciousness'],
            fallback:intent==='analysis'?['execution']:[],
          },
          timeline:[
            {stage:'received',time:created,duration:Math.random()*200},
            {stage:'analyzed',time:created+Math.random()*500,duration:Math.random()*300},
            {stage:'routed',time:created+Math.random()*1000,duration:Math.random()*200},
            {stage:'processed',time:created+Math.random()*2000,duration:completed?(completed-created-Math.random()*2000):null},
          ],
        });
      }
      pipelines.sort((a,b)=>b.timestamp-a.timestamp);
    }

    // ── 统计 ──
    function updateStats() {
      const active=pipelines.filter(p=>!['complete','interrupted'].includes(p.state));
      const completed=pipelines.filter(p=>p.state==='complete');
      const interrupted=pipelines.filter(p=>p.state==='interrupted');
      const entangled=pipelines.filter(p=>p.quantumState==='entangled');
      const times=completed.map(p=>p.processingDuration).filter(t=>t>0);

      document.getElementById('stat-total').textContent=pipelines.length;
      document.getElementById('stat-active').textContent=active.length;
      document.getElementById('stat-completed').textContent=completed.length;
      document.getElementById('stat-interrupted').textContent=interrupted.length;
      document.getElementById('stat-entangled').textContent=entangled.length;
      document.getElementById('stat-avg-time').textContent=
        times.length>0?Math.round(times.reduce((a,b)=>a+b,0)/times.length)+'ms':'0ms';
    }

    // ── 过滤 ──
    function setFilter(filter,el){
      currentFilter=filter;
      document.querySelectorAll('#filter-bar .filter-tag').forEach(t=>t.classList.remove('active'));
      if(el)el.classList.add('active');
      applyFilters();
    }
    function setIntentFilter(filter,el){
      currentIntentFilter=filter;
      document.querySelectorAll('[data-intent]').forEach(t=>t.classList.remove('active'));
      if(el)el.classList.add('active');
      applyFilters();
    }
    function applyFilters(){
      searchQuery=document.getElementById('search-input').value.toLowerCase();
      renderPipelineList();
    }

    function getFilteredPipelines(){
      return pipelines.filter(p=>{
        if(currentFilter==='processing'&&['complete','interrupted'].includes(p.state))return false;
        if(currentFilter==='complete'&&p.state!=='complete')return false;
        if(currentFilter==='interrupted'&&p.state!=='interrupted')return false;
        if(currentFilter==='entangled'&&p.quantumState!=='entangled')return false;
        if(currentFilter==='superposed'&&p.quantumState!=='superposed')return false;
        if(currentIntentFilter!=='all'&&p.analysis?.intent!==currentIntentFilter)return false;
        if(searchQuery&&!(p.content||'').toLowerCase().includes(searchQuery)&&!(p.from||'').toLowerCase().includes(searchQuery))return false;
        return true;
      });
    }

    // ── 渲染列表 ──
    function renderPipelineList() {
      const filtered=getFilteredPipelines().slice(0,50);
      const container=document.getElementById('pipeline-list');
      if(filtered.length===0){
        container.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div>暂无匹配的消息管道</div>';
        return;
      }
      container.innerHTML=filtered.map(p=>`
        <div class="pipeline-item ${selectedId===p.msgId?'selected':''} ${selectedIds.has(p.msgId)?'selected':''}"
             onclick="${selectedIds.size>0?`toggleSelect('${p.msgId}',event)`:`selectPipeline('${p.msgId}')`}">
          <div class="pi-header">
            <span><span class="badge badge-${p.quantumState}">${p.quantumState}</span></span>
            <span class="state-badge state-${p.state}">${p.state}</span>
            ${selectedIds.has(p.msgId)?'<span style="color:var(--accent);">✓</span>':''}
          </div>
          <div class="pi-content">${(p.content||'').substring(0,55)}</div>
          <div class="pi-footer">
            <span>${p.from} · <span class="intent-badge intent-${p.analysis?.intent||'general'}">${p.analysis?.intent||'general'}</span></span>
            <span>${new Date(p.timestamp).toLocaleTimeString()}</span>
          </div>
        </div>
      `).join('');
    }

    // ── 多选 ──
    function toggleSelect(msgId,event){
      event.stopPropagation();
      if(selectedIds.has(msgId))selectedIds.delete(msgId);else selectedIds.add(msgId);
      document.getElementById('batch-count').textContent=selectedIds.size;
      document.getElementById('batch-bar').style.display=selectedIds.size>0?'flex':'none';
      renderPipelineList();
    }
    function clearSelection(){selectedIds.clear();document.getElementById('batch-bar').style.display='none';renderPipelineList();}
    function batchRetry(){showToast(`🔄 重试 ${selectedIds.size} 条消息`);clearSelection();}
    function batchCancel(){showToast(`✕ 取消 ${selectedIds.size} 条消息`);clearSelection();}

    // ── 选择管道 ──
    function selectPipeline(msgId) {
      if(selectedIds.size>0) return; // 多选模式不触发单选
      selectedId=msgId; renderPipelineList();
      const p=pipelines.find(pp=>pp.msgId===msgId); if(!p) return;
      const panel=document.getElementById('detail-panel');
      const affect=p.analysis?.affect||[0.5,0.5,0.5,0.5,0.5,0.5];
      const dims=['愉悦度','唤醒度','支配度','紧急度','好奇心','置信度'];
      const colors=['#44dd88','#ff6644','#4488ff','#ff4444','#ffcc44','#aa66ff'];

      panel.innerHTML=`
        <h3>📋 管道详情 <span style="font-size:11px;color:var(--text3);font-weight:400;font-family:'Cascadia Code',monospace;">${p.msgId}</span></h3>

        <div class="detail-section">
          <h4>📝 基本信息</h4>
          <div class="detail-row"><span class="key">发送者</span><span class="val">${p.from}</span></div>
          <div class="detail-row"><span class="key">内容</span><span class="val" style="max-width:300px;overflow:hidden;text-overflow:ellipsis;">${p.content}</span></div>
          <div class="detail-row"><span class="key">渠道</span><span class="val">${p.channel}</span></div>
          <div class="detail-row"><span class="key">优先级</span><span class="val">${p.priority}</span></div>
          <div class="detail-row"><span class="key">状态</span><span class="val"><span class="state-badge state-${p.state}">${p.state}</span></span></div>
          <div class="detail-row"><span class="key">量子态</span><span class="val"><span class="badge badge-${p.quantumState}">${p.quantumState}</span></span></div>
          <div class="detail-row"><span class="key">时间戳</span><span class="val">${new Date(p.timestamp).toLocaleString()}</span></div>
          ${p.completedAt?`<div class="detail-row"><span class="key">处理耗时</span><span class="val" style="color:var(--green);">${p.processingDuration}ms</span></div>`:''}
          ${p.completedAt?`<div class="detail-row"><span class="key">完成时间</span><span class="val">${new Date(p.completedAt).toLocaleString()}</span></div>`:''}
        </div>

        <div class="detail-section">
          <h4>🧠 意图分析</h4>
          <div class="detail-row"><span class="key">意图</span><span class="val"><span class="intent-badge intent-${p.analysis?.intent||'general'}">${p.analysis?.intent||'N/A'}</span></span></div>
          <div class="detail-row"><span class="key">复杂度</span><span class="val">${p.analysis?.complexity?.level||'N/A'} (${((p.analysis?.complexity?.score||0)*100).toFixed(0)}%)</span></div>
          <div class="detail-row"><span class="key">语言</span><span class="val">${p.analysis?.language==='zh'?'中文':'English'}</span></div>
          <div class="detail-row"><span class="key">置信度</span><span class="val">${((p.analysis?.confidence||0)*100).toFixed(0)}%</span></div>
          ${(p.analysis?.keywords||[]).length>0?`<div class="detail-row"><span class="key">关键词</span><span class="val">${p.analysis.keywords.join(', ')}</span></div>`:''}
          ${(p.analysis?.entities||[]).length>0?`<div class="detail-row"><span class="key">实体</span><span class="val">${p.analysis.entities.join(', ')}</span></div>`:''}
        </div>

        <div class="detail-section">
          <h4>📐 情感向量 (6维)</h4>
          ${dims.map((d,i)=>`
            <div class="affect-bar">
              <span class="a-label">${d}</span>
              <div class="a-bar"><div class="a-fill" style="width:${affect[i]*100}%;background:${colors[i]};"></div></div>
              <span class="a-val">${(affect[i]*100).toFixed(0)}%</span>
            </div>
          `).join('')}
        </div>

        <div class="detail-section">
          <h4>🎯 路由决策</h4>
          <div class="detail-row"><span class="key">目标核心</span><span class="val" style="color:var(--accent);">${p.route?.target||'N/A'}</span></div>
          <div class="detail-row"><span class="key">参与核心</span><span class="val">${(p.route?.cores||[]).join(', ')||'N/A'}</span></div>
          ${(p.route?.fallback||[]).length>0?`<div class="detail-row"><span class="key">备选核心</span><span class="val">${p.route.fallback.join(', ')}</span></div>`:''}
        </div>

        <div class="detail-section">
          <h4>⏱ 处理时间线</h4>
          <div class="timeline">
            ${(p.timeline||[]).map(t=>`
              <div class="timeline-step ${t.duration!==null?'completed':'active'}">
                <span class="ts-label">${t.stage}</span>
                <span class="ts-value">${t.duration!==null?Math.round(t.duration)+'ms':'处理中...'}</span>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="detail-actions">
          <button class="action-btn primary" onclick="retryPipeline('${p.msgId}')">🔄 重试</button>
          <button class="action-btn" onclick="viewDAG('${p.msgId}')">🔗 DAG溯源</button>
          <button class="action-btn" onclick="copyPipeline('${p.msgId}')">📋 复制详情</button>
          <button class="action-btn danger" onclick="cancelPipeline('${p.msgId}')">✕ 取消</button>
        </div>

        <div class="dag-view" id="dag-view">
          <canvas id="dag-canvas"></canvas>
          <div class="dag-legend">
            <span style="color:var(--cyan);">● 接收</span>
            <span style="color:var(--yellow);">● 分析</span>
            <span style="color:var(--accent);">● 路由</span>
            <span style="color:var(--purple);">● 处理</span>
            <span style="color:var(--green);">● 完成</span>
          </div>
        </div>
      `;

      // 渲染小DAG
      setTimeout(()=>renderPipelineDAG(p),150);
    }

    // ── DAG渲染 ──
    function renderPipelineDAG(pipeline) {
      const canvas=document.getElementById('dag-canvas'); if(!canvas) return;
      const container=canvas.parentElement;
      canvas.width=container.clientWidth; canvas.height=container.clientHeight;
      const ctx=canvas.getContext('2d');
      const w=canvas.width, h=canvas.height;

      // 节点
      const stages=[
        {label:'接收',x:w*0.12,y:h*0.5,color:'#44ddff',state:'receiving'},
        {label:'分析',x:w*0.3,y:h*0.25,color:'#ffcc44',state:'analyzing'},
        {label:'路由',x:w*0.5,y:h*0.45,color:'#4488ff',state:'routing'},
        {label:'处理',x:w*0.7,y:h*0.3,color:'#aa66ff',state:'processing'},
        {label:'响应',x:w*0.88,y:h*0.5,color:'#44dd88',state:'responding'},
      ];
      const completedStages=new Set((pipeline.timeline||[]).filter(t=>t.duration!==null).map(t=>t.stage));

      // 连线
      ctx.strokeStyle='rgba(136,136,187,0.2)';ctx.lineWidth=1.5;
      for(let i=0;i<stages.length-1;i++){
        ctx.beginPath();ctx.moveTo(stages[i].x,stages[i].y);ctx.lineTo(stages[i+1].x,stages[i+1].y);ctx.stroke();
      }

      // 节点
      for(const stage of stages){
        const isComplete=completedStages.has(stage.stage);
        const r=isComplete?10:8;
        ctx.fillStyle=stage.color;
        ctx.shadowColor=stage.color;ctx.shadowBlur=isComplete?10:4;
        ctx.beginPath();ctx.arc(stage.x,stage.y,r,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        ctx.fillStyle='#e0e0ff';ctx.font='10px sans-serif';ctx.textAlign='center';
        ctx.fillText(stage.label,stage.x,stage.y+r+14);
        if(!isComplete){ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.beginPath();ctx.arc(stage.x,stage.y,r+4,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
      }

      // 量子态标记
      ctx.fillStyle='rgba(170,102,255,0.8)';ctx.font='11px sans-serif';ctx.textAlign='center';
      ctx.fillText(`⚛ ${pipeline.quantumState}`,w/2,20);
    }

    // ── 操作 ──
    function retryPipeline(msgId){showToast('🔄 正在重试管道...');}
    function cancelPipeline(msgId){showToast('✕ 管道已取消');}
    function viewDAG(msgId){showToast('🔗 DAG溯源视图已展开');}
    function copyPipeline(msgId){
      const p=pipelines.find(pp=>pp.msgId===msgId); if(!p) return;
      const text=`消息管道: ${p.msgId}\n发送者: ${p.from}\n内容: ${p.content}\n状态: ${p.state}\n量子态: ${p.quantumState}\n时间: ${new Date(p.timestamp).toLocaleString()}`;
      navigator.clipboard.writeText(text).then(()=>showToast('📋 已复制到剪贴板'));
    }

    function showToast(msg){
      let t=document.getElementById('pipeline-toast');
      if(!t){t=document.createElement('div');t.id='pipeline-toast';t.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:8px 20px;background:var(--card);border:1px solid var(--green);border-radius:8px;font-size:12px;color:var(--green);z-index:100;pointer-events:none;transition:opacity .3s;';document.body.appendChild(t);}
      t.textContent=msg;t.style.opacity='1';t.style.display='block';
      clearTimeout(t._timeout);t._timeout=setTimeout(()=>{t.style.opacity='0';setTimeout(()=>{t.style.display='none';},300);},2500);
    }

    // ── 键盘快捷键 ──
    document.addEventListener('keydown',(e)=>{
      if(e.key==='Escape'){selectedId=null;renderPipelineList();document.getElementById('detail-panel').innerHTML='<div class="empty-state"><div class="empty-icon">⚛️</div><div>选择左侧管道查看消息处理详情</div></div>';}
      if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('search-input').focus();}
    });

    // ── 初始化 ──
    generateDemoData(); updateStats(); renderPipelineList();
    if(pipelines.length>0) selectPipeline(pipelines[0].msgId);

    setInterval(()=>{
      if(window.triCoreAPI){window.triCoreAPI.getActivePipelines().then(active=>{/* update */});}
      updateStats();
    },3000);

    // 设置按钮
    const btnSettings=document.getElementById('btn-settings');
    if(btnSettings){btnSettings.addEventListener('click',()=>{if(window.TriCoreSettingsPanel)window.TriCoreSettingsPanel.toggle();});btnSettings.addEventListener('mouseenter',()=>{btnSettings.style.borderColor='#4488ff';btnSettings.style.color='#4488ff';});btnSettings.addEventListener('mouseleave',()=>{btnSettings.style.borderColor='var(--border)';btnSettings.style.color='var(--text2)';});}
  </script>
  <script src="../shared/settings-manager.js"></script>
  <script src="../shared/settings-panel.js"></script>
  <link rel="stylesheet" href="../shared/settings-panel.css">
  <link rel="stylesheet" href="../shared/onboarding-wizard.css">
  <link rel="stylesheet" href="../shared/self-check-panel.css">
  <script src="../shared/onboarding-wizard.js"></script>
  <script src="../shared/self-check-panel.js"></script>
</body>
</html>
